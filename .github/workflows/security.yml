name: Security Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dotnet-vulnerability-audit:
    name: .NET dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore RezSaaS.sln -p:NuGetAudit=false

      - name: Audit vulnerable packages
        run: |
          dotnet list RezSaaS.sln package --vulnerable --include-transitive --format json > audit.json
          if jq -e '.projects[]?.frameworks[]?.topLevelPackages[]?.vulnerabilities // empty' audit.json > /dev/null 2>&1 || \
             jq -e '.projects[]?.frameworks[]?.transitivePackages[]?.vulnerabilities // empty' audit.json > /dev/null 2>&1; then
            echo "::error::Vulnerable packages detected!"
            jq . audit.json
            exit 1
          else
            echo "No vulnerable packages found."
          fi

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp,javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
