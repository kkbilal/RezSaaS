services:
  postgres:
    image: postgres:18.4-alpine3.23
    environment:
      POSTGRES_DB: ${REZSAAS_POSTGRES_DB:-rezsaas}
      POSTGRES_PASSWORD: ${REZSAAS_POSTGRES_PASSWORD:-rezsaas-local-only}
      POSTGRES_USER: ${REZSAAS_POSTGRES_USER:-rezsaas}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${REZSAAS_POSTGRES_USER:-rezsaas} -d ${REZSAAS_POSTGRES_DB:-rezsaas}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${REZSAAS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
